# Databricks Asset Bundle — JGC AP Posting Pipeline
# Deploy: databricks bundle deploy -t dev
# Run:    databricks bundle run <job_name> -t dev

bundle:
  name: jgc-ap-posting

workspace:
  host: https://adb-7405612201335882.2.azuredatabricks.net

# ══════════════════════════════════════════════════════════════
# TARGETS (environments)
# ══════════════════════════════════════════════════════════════

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}

# ══════════════════════════════════════════════════════════════
# RESOURCES — Jobs (empty until Phase 4)
# Phase 0 has no scheduled jobs; the token manager is a library
# notebook called via %run from other notebooks. Phase 4 will add
# jgc_qbo_post_bills here.
# ══════════════════════════════════════════════════════════════

resources:
  jobs: {}
