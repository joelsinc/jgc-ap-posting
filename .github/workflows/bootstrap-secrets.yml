name: Bootstrap AP Secrets → Databricks Scope

# MANUAL-TRIGGER ONLY. Run once per environment (sandbox first, e001
# later). Reads 4 values from GitHub repo secrets and seeds them into
# the Databricks-backed scope qbo-ap-tokens.
#
# Inputs:
#   realm_key  sandbox | e001  (choose which realm's secrets to seed)
#
# Required GitHub repo secrets (per realm_key):
#   realm_key=sandbox →
#     AP_QBO_CLIENT_ID_DEV
#     AP_QBO_CLIENT_SECRET_DEV
#     AP_QBO_REFRESH_TOKEN_SANDBOX
#     AP_QBO_REALM_ID_SANDBOX
#   realm_key=e001 →
#     AP_QBO_CLIENT_ID_PROD
#     AP_QBO_CLIENT_SECRET_PROD
#     AP_QBO_REFRESH_TOKEN_E001
#     AP_QBO_REALM_ID_E001
#
# After running, remove / rotate the GitHub repo secrets. The Databricks
# scope becomes the source of truth; refresh token rotates inside
# Databricks on every use.

on:
  workflow_dispatch:
    inputs:
      realm_key:
        description: "Realm to seed (sandbox or e001)"
        required: true
        default: "sandbox"
        type: choice
        options:
          - sandbox
          - e001

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  SCOPE: qbo-ap-tokens

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Configure Databricks
        run: |
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = $DATABRICKS_HOST" >> ~/.databrickscfg
          echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg

      - name: Ensure scope exists (idempotent)
        run: |
          if databricks secrets list-scopes | grep -q "^${SCOPE}\b"; then
            echo "ℹ️  Scope '${SCOPE}' already exists — skipping create"
          else
            databricks secrets create-scope "${SCOPE}"
            echo "✅ Scope '${SCOPE}' created"
          fi

      - name: Seed secrets for realm_key=${{ github.event.inputs.realm_key }}
        env:
          REALM_KEY: ${{ github.event.inputs.realm_key }}
          CID_DEV:   ${{ secrets.AP_QBO_CLIENT_ID_DEV }}
          CSC_DEV:   ${{ secrets.AP_QBO_CLIENT_SECRET_DEV }}
          CID_PROD:  ${{ secrets.AP_QBO_CLIENT_ID_PROD }}
          CSC_PROD:  ${{ secrets.AP_QBO_CLIENT_SECRET_PROD }}
          RT_SBX:    ${{ secrets.AP_QBO_REFRESH_TOKEN_SANDBOX }}
          RT_E001:   ${{ secrets.AP_QBO_REFRESH_TOKEN_E001 }}
          RID_SBX:   ${{ secrets.AP_QBO_REALM_ID_SANDBOX }}
          RID_E001:  ${{ secrets.AP_QBO_REALM_ID_E001 }}
        run: |
          set -e

          put_secret() {
            local key="$1" value="$2"
            if [ -z "$value" ]; then
              echo "❌ Missing GitHub secret for $key — add it in repo Settings → Secrets"
              exit 1
            fi
            printf "%s" "$value" | databricks secrets put-secret "$SCOPE" "$key"
            echo "✅ Seeded $key"
          }

          case "$REALM_KEY" in
            sandbox)
              put_secret "qbo-ap-client-id-dev"          "$CID_DEV"
              put_secret "qbo-ap-client-secret-dev"      "$CSC_DEV"
              put_secret "qbo-ap-refresh-token-sandbox"  "$RT_SBX"
              put_secret "qbo-ap-realm-id-sandbox"       "$RID_SBX"
              ;;
            e001)
              put_secret "qbo-ap-client-id-prod"         "$CID_PROD"
              put_secret "qbo-ap-client-secret-prod"     "$CSC_PROD"
              put_secret "qbo-ap-refresh-token-e001"     "$RT_E001"
              put_secret "qbo-ap-realm-id-e001"          "$RID_E001"
              ;;
            *)
              echo "❌ Unknown realm_key: $REALM_KEY"
              exit 1
              ;;
          esac

      - name: Summary
        run: |
          echo "✅ Bootstrap complete for realm_key=${{ github.event.inputs.realm_key }}"
          echo "   Next: run databricks/notebooks/test_ap_token.py to verify"
